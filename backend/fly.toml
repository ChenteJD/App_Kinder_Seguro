app = "vinculo-preescolar-api"
primary_region = "mia"

[build]
  [build.args]
    NODE_ENV = "production"

[env]
  PORT = "3001"
  NODE_ENV = "production"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "sqlite_data"
  destination = "/data"
  initial_size = "1gb"
